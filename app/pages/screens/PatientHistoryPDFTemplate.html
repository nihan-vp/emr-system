<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=210mm, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1e293b;
            background: white;
        }
        @page {
            size: A4;
            margin: 0;
        }
        .report-header {
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 100vw;
        }
        .report-header h1 {
            color: #0ea5e9;
            margin: 0;
            font-size: 28px;
        }
        .patient-info {
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 100vw;
        }
        .info-group {
            flex: 1;
            min-width: 150px;
        }
        .info-group label {
            font-size: 12px;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
        }
        .info-group div {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }
        h2 {
            color: #334155;
            margin-bottom: 20px;
        }
        .card {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            width: 100%;
        }
        table {
            width: 100%;
            max-width: 100vw;
            border-collapse: collapse;
            margin: 0;
            font-size: 16px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 6px 4px;
            text-align: left;
            word-break: break-word;
        }
        th {
            background: #f1f5f9;
        }
        .footer {
            width: 100%;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .vitals-card {
            background: #f0f9ff;
            border-left: 5px solid #0ea5e9;
        }
        .rx-card {
            background: #fdf4ff;
            border-left: 5px solid #d946ef;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .header h3 {
            margin: 0;
            font-size: 18px;
            color: #0f172a;
        }
        .header span {
            color: #64748b;
            font-size: 14px;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .data-item {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
        ul {
            margin: 10px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="report-header">
        <h1 style="width:100%;max-width:100vw;">Comprehensive Patient History</h1>
        <p style="width:100%;max-width:100vw;">Generated on {{date}}</p>
    </div>
    <div class="patient-info">
        <div class="info-group"><label>Patient Name</label><div>{{patientName}}</div></div>
        <div class="info-group"><label>Patient ID</label><div>#{{patientId}}</div></div>
        <div class="info-group"><label>Age / Gender</label><div>{{ageGender}}</div></div>
        <div class="info-group"><label>Contact</label><div>{{contact}}</div></div>
    </div>
    <h2 style="width:100%;max-width:100vw;">Timeline Records</h2>
    <div style="width:100%;max-width:100vw;">
        {{timelineHtml}}
    </div>
</body>
</html>
